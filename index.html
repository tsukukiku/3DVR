<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Everything / 3D-VR</title>
  <style>
    :root{--ink:#111817;--muted:#5c6a66;--paper:#edf2ec;--panel:rgba(244,250,244,.86);--aqua:#0f7280;--deep:#0e1f24;--line:rgba(25,56,58,.18)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Bahnschrift","Noto Sans SC",sans-serif;background:radial-gradient(circle at 78% 8%,rgba(255,255,255,.82),transparent 26%),radial-gradient(circle at 8% 92%,rgba(31,138,151,.24),transparent 31%),linear-gradient(135deg,#f5f0df 0%,#b7d9d4 52%,#6f9eaa 100%);overflow-x:hidden}.page{min-height:100vh;padding:18px clamp(12px,3vw,42px) 28px;background-image:linear-gradient(rgba(15,80,93,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(15,80,93,.05) 1px,transparent 1px);background-size:34px 34px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.brand{font-size:clamp(38px,8vw,96px);line-height:.86;letter-spacing:-.07em;font-weight:900;text-transform:uppercase}.brand span{color:var(--aqua)}.back{color:#f5fbf8;background:var(--deep);border-radius:999px;padding:10px 14px;text-decoration:none;font-size:13px;font-weight:900;white-space:nowrap}.layout{display:grid;grid-template-columns:minmax(280px,380px) minmax(0,1fr);gap:18px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 20px 70px rgba(15,40,38,.2);padding:15px;backdrop-filter:blur(12px)}label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:900;margin:11px 0 6px}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.72);color:var(--ink);padding:10px 11px;outline:none}textarea{min-height:84px;resize:vertical;font-family:"Noto Sans SC",sans-serif;line-height:1.55}.pass-row{display:grid;grid-template-columns:minmax(116px,160px) 1fr;gap:10px;align-items:center}.note{color:var(--aqua);font-size:13px;font-weight:900;white-space:nowrap}.preview{min-height:120px;border:1px dashed rgba(15,80,93,.38);border-radius:18px;display:grid;place-items:center;overflow:hidden;color:var(--muted);background:rgba(255,255,255,.28);text-align:center}.preview img{width:100%;height:100%;object-fit:contain;display:block}.actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}.file-button.local-open{margin-left:1.8em}button,.file-button{border:0;border-radius:999px;background:var(--deep);color:#f7fffb;padding:7px 12px;line-height:1.05;min-height:34px;cursor:pointer;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}button.secondary{background:var(--aqua)}.hidden-file{display:none}.status{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.5}.viewer-wrap{display:grid;gap:13px}.viewer{height:min(67vh,720px);min-height:380px;border-radius:26px;border:1px solid rgba(255,255,255,.42);box-shadow:0 24px 80px rgba(8,33,36,.28);overflow:hidden;position:relative;background:linear-gradient(180deg,#dbeef2,#7fa9b0);cursor:grab;user-select:none;touch-action:none}.viewer.dragging{cursor:grabbing}.viewer canvas{display:block;width:100%;height:100%}.viewer:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,transparent 54%,rgba(0,0,0,.18) 100%)}.viewer-tools{display:flex;justify-content:flex-end;gap:8px;position:relative;z-index:30;pointer-events:auto}.viewer-tools button{width:38px;height:38px;min-height:38px;padding:2px;background:transparent;border:0;border-radius:0;box-shadow:none;pointer-events:auto}.viewer-tools button img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}.viewer-tools button.active{background:transparent}.hud{position:absolute;left:14px;bottom:14px;display:flex;gap:8px;flex-wrap:wrap;z-index:2}.pill{border-radius:999px;background:rgba(8,20,24,.78);color:#eefcf7;padding:8px 11px;font-size:12px;font-weight:900;backdrop-filter:blur(8px)}.empty-text{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px;color:#244044;font-weight:900;line-height:1.7;z-index:1}.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.sample{border:1px solid var(--line);border-radius:16px;min-height:92px;background-image:linear-gradient(to top,rgba(0,0,0,.56),rgba(0,0,0,.08)),var(--thumb);background-size:cover;background-position:center;color:#f7fffb;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.45);overflow:hidden;display:flex;align-items:flex-end;padding:10px;cursor:pointer}.sample.active{outline:3px solid rgba(15,114,128,.75);outline-offset:2px}footer{margin-top:22px;padding-top:14px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;display:flex;gap:14px;flex-wrap:wrap}footer a{color:var(--ink)}body.lights-off{background:#000;overflow:hidden}body.lights-off .page{min-height:100vh;padding:0;background:#000}body.lights-off .topbar,body.lights-off aside.panel,body.lights-off article.panel,body.lights-off footer{display:none}body.lights-off .layout{display:block;width:100vw;height:100vh;margin:0}body.lights-off .viewer-wrap{display:flex;width:100vw;height:100vh;align-items:center;justify-content:center;background:#000;position:relative}body.lights-off .viewer-tools{position:fixed;right:12px;top:12px;z-index:100}body.lights-off .viewer{width:100vw;height:min(56.25vw,100vh);min-height:0;border:0;border-radius:0;box-shadow:none;background:#000}body.lights-off .viewer:after{display:none}@media(max-width:900px){.layout{grid-template-columns:1fr}.viewer{height:58vh;min-height:340px}.gallery{grid-template-columns:repeat(2,1fr)}.brand{font-size:clamp(36px,12vw,68px)}.viewer-tools{justify-content:flex-start}.viewer-tools button{width:34px;height:34px;min-height:34px;padding:2px}body.lights-off .viewer-tools{justify-content:flex-end}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar"><div class="brand">3D-<span>VR</span></div><a class="back" href="/3DEV/">← 3D Everything</a></div>
    <section class="layout">
      <aside class="panel">
        <label for="spaceName">建筑 / 环境说明</label><input id="spaceName" placeholder="例如：modern cafe interior / forest path / gallery lobby" />
        <label for="vrPasscode">口令</label><div class="pass-row"><input id="vrPasscode" type="password" placeholder="3DVR" autocomplete="off" /><div class="note">每IP每日3回</div></div>
        <label>上传单一视角普通照片</label><input id="imageInput" type="file" accept="image/*" /><div class="preview" id="preview">上传后显示单一视角图预览</div>
        <label for="extraPrompt">补充要求</label><textarea id="extraPrompt" placeholder="可选：白天/夜晚、现代/复古、室内/室外、保留哪些元素、画面风格等"></textarea>
        <div class="actions"><button id="btnPreview" type="button">预览单一视角图</button><button class="secondary" id="btnSubmit" type="button">生成360全景</button><label class="file-button local-open" for="localPanoInput">打开已有全景图</label><input class="hidden-file" id="localPanoInput" type="file" accept="image/*" /></div>
        <div class="status" id="status">精品图库先加载小图；点击某张后才加载高清360全景。图库或【打开已有全景图】需要 2:1 横长全景图。</div>
      </aside>
      <section class="viewer-wrap">
        <div class="viewer-tools"><button id="btnViewerFullscreen" type="button" title="Light"><img id="lightIcon" src="./assets/icons/light-off.png" alt="Light"></button><button id="btnAutoRotate" type="button" title="Rotation 3rpm"><img id="rotationIcon" src="./assets/icons/rotation-on.png" alt="Rotation"></button></div><div class="viewer" id="viewer" aria-label="360 panorama viewer"><div class="empty-text" id="emptyText">360 球面全景观察区<br>拖拽环视，滚轮或双指缩放</div><div class="hud"><span class="pill" id="angleText">Yaw 0°</span><span class="pill" id="pitchText">Pitch 0°</span><span class="pill" id="zoomText">FOV 75°</span></div></div>
        <article class="panel"><label>精品图库 360 全景照片</label><div class="gallery" id="gallery"></div></article>
      </section>
    </section>
    <footer><span>© Star Style Studio</span><a href="/3DEV/policy.html">Policy</a><a href="/3DEV/privacy.html">Privacy</a><a href="/3DEV/">3D Everything</a></footer>
  </main>
  <script type="module">
    import * as THREE from './vendor/three/build/three.module.js';
    const imageInput=document.getElementById('imageInput'),localPanoInput=document.getElementById('localPanoInput'),preview=document.getElementById('preview'),viewer=document.getElementById('viewer'),emptyText=document.getElementById('emptyText'),angleText=document.getElementById('angleText'),pitchText=document.getElementById('pitchText'),zoomText=document.getElementById('zoomText'),statusEl=document.getElementById('status'),btnPreview=document.getElementById('btnPreview'),btnSubmit=document.getElementById('btnSubmit'),btnViewerFullscreen=document.getElementById('btnViewerFullscreen'),btnAutoRotate=document.getElementById('btnAutoRotate'),lightIcon=document.getElementById('lightIcon'),rotationIcon=document.getElementById('rotationIcon'),spaceName=document.getElementById('spaceName'),passcode=document.getElementById('vrPasscode'),extraPrompt=document.getElementById('extraPrompt'),gallery=document.getElementById('gallery');
    const samples=[{'title':'Temple of Heaven','src':'./assets/vr-gallery-01-the Temple of Heaven.png','thumb':'./assets/thumbs/vr-gallery-01-the Temple of Heaven-thumb.jpg'},{'title':'Hall of Prayer','src':'./assets/vr-gallery-02-Hall of Prayer for Good Year .png','thumb':'./assets/thumbs/vr-gallery-02-Hall of Prayer for Good Year -thumb.jpg'},{'title':'Mountain Panorama','src':'./assets/vr-gallery-03-hugo-rouquette.jpg','thumb':'./assets/thumbs/vr-gallery-03-hugo-rouquette-thumb.jpg'},{'title':'Hong Kong Night','src':'./assets/vr-gallery-04-Hongkong.jpg','thumb':'./assets/thumbs/vr-gallery-04-Hongkong-thumb.jpg'},{'title':'Living Room','src':'./assets/vr-gallery-05-living-room.jpg','thumb':'./assets/thumbs/vr-gallery-05-living-room-thumb.jpg'},{'title':'Miyajima','src':'./assets/vr-gallery-06-Miyajima.png','thumb':'./assets/thumbs/vr-gallery-06-Miyajima-thumb.jpg'},{'title':'Shibuya','src':'./assets/vr-gallery-07-Shibuya.png','thumb':'./assets/thumbs/vr-gallery-07-Shibuya-thumb.jpg'},{'title':'Night Sky','src':'./assets/vr-gallery-08-night sky.png','thumb':'./assets/thumbs/vr-gallery-08-night sky-thumb.jpg'}];
    let imagePayload=null,activeObjectUrl='',dragging=false,lastX=0,lastY=0,lon=0,lat=0,fov=75,material,mesh,autoRotate=false,hasPanorama=false,lastFrameTime=performance.now();
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(fov,1,.1,1100);
    const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    viewer.prepend(renderer.domElement);
    function initSphere(){const geometry=new THREE.SphereGeometry(500,96,64);geometry.scale(-1,1,1);material=new THREE.MeshBasicMaterial({color:0xffffff});mesh=new THREE.Mesh(geometry,material);scene.add(mesh);}
    function resize(){const w=viewer.clientWidth||800,h=viewer.clientHeight||500;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
    function updateCamera(){lat=Math.max(-85,Math.min(85,lat));const phi=THREE.MathUtils.degToRad(90-lat),theta=THREE.MathUtils.degToRad(lon);camera.target=new THREE.Vector3(500*Math.sin(phi)*Math.cos(theta),500*Math.cos(phi),500*Math.sin(phi)*Math.sin(theta));camera.lookAt(camera.target);camera.fov=fov;camera.updateProjectionMatrix();angleText.textContent=`Yaw ${Math.round(((lon%360)+360)%360)}°`;pitchText.textContent=`Pitch ${Math.round(lat)}°`;zoomText.textContent=`FOV ${Math.round(fov)}°`;}
    function animate(){requestAnimationFrame(animate);const now=performance.now(),dt=Math.min(.08,(now-lastFrameTime)/1000);lastFrameTime=now;if(autoRotate&&!dragging)lon+=3*360/60*dt;updateCamera();renderer.render(scene,camera);}
    function setPanorama(src,title='???'){if(activeObjectUrl&&activeObjectUrl!==src)URL.revokeObjectURL(activeObjectUrl);new THREE.TextureLoader().load(src,texture=>{texture.colorSpace=THREE.SRGBColorSpace;texture.minFilter=THREE.LinearFilter;if(material.map)material.map.dispose();material.map=texture;material.needsUpdate=true;hasPanorama=true;emptyText.style.display='none';lon=0;lat=0;fov=75;statusEl.textContent=`${title} ?????????????????????`;updateCamera();},undefined,error=>{console.error(error);hasPanorama=false;autoRotate=false;setRotationIcon(false);btnAutoRotate.classList.remove('active');statusEl.textContent='???????????????????';});}
    function readFileAsDataUrl(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||''));reader.onerror=reject;reader.readAsDataURL(file);});}
    function loadImage(dataUrl){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=dataUrl;});}
    async function shrinkImageToLimit(file,maxBytes=5*1024*1024){const originalDataUrl=await readFileAsDataUrl(file);if(file.size<=maxBytes)return{dataUrl:originalDataUrl,mimeType:file.type||'image/jpeg',bytes:file.size,originalName:file.name};const img=await loadImage(originalDataUrl);let dataUrl=originalDataUrl,quality=.88;for(let i=0;i<10;i+=1){const scale=Math.pow(.84,i+1),canvas=document.createElement('canvas');canvas.width=Math.max(900,Math.round(img.naturalWidth*scale));canvas.height=Math.max(600,Math.round(img.naturalHeight*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);dataUrl=canvas.toDataURL('image/jpeg',quality);const approxBytes=Math.round((dataUrl.length-dataUrl.indexOf(',')-1)*.75);if(approxBytes<=maxBytes)return{dataUrl,mimeType:'image/jpeg',bytes:approxBytes,originalName:file.name};quality=Math.max(.55,quality-.08);}const approxBytes=Math.round((dataUrl.length-dataUrl.indexOf(',')-1)*.75);return{dataUrl,mimeType:'image/jpeg',bytes:approxBytes,originalName:file.name};}
    function selectGalleryItem(button,sample){document.querySelectorAll('.sample').forEach(item=>item.classList.toggle('active',item===button));setPanorama(sample.src,sample.title);}
    function buildGallery(){gallery.innerHTML='';samples.forEach((sample,index)=>{const button=document.createElement('button');button.type='button';button.className='sample';button.style.setProperty('--thumb',`url("${sample.thumb||sample.src}")`);button.textContent=sample.title;button.addEventListener('click',()=>selectGalleryItem(button,sample));gallery.appendChild(button);});}
    imageInput.addEventListener('change',async()=>{const file=imageInput.files&&imageInput.files[0];if(!file)return;statusEl.textContent='正在处理图片，必要时自动压缩到 5MB 以下...';imagePayload=await shrinkImageToLimit(file);preview.innerHTML=`<img src="${imagePayload.dataUrl}" alt="上传图片预览">`;statusEl.textContent=`图片已选择：${Math.round(imagePayload.bytes/1024)}KB`;});
    localPanoInput.addEventListener('change',()=>{const file=localPanoInput.files&&localPanoInput.files[0];if(!file)return;if(activeObjectUrl)URL.revokeObjectURL(activeObjectUrl);activeObjectUrl=URL.createObjectURL(file);setPanorama(activeObjectUrl,file.name||'本地全景文件');});
    btnPreview.addEventListener('click',()=>{if(!imagePayload){alert('请先上传建筑或环境图片');return;}setPanorama(imagePayload.dataUrl,'上传参考图');});
    function setLightIcon(isOff){lightIcon.src=isOff?'./assets/icons/light-on.png':'./assets/icons/light-off.png';btnViewerFullscreen.title=isOff?'Switch light on':'Switch light off';}
    function setRotationIcon(isOn){rotationIcon.src=isOn?'./assets/icons/rotation-off.png':'./assets/icons/rotation-on.png';btnAutoRotate.title=isOn?'Stop rotation':'Start rotation 3rpm';}
    btnAutoRotate.addEventListener('click',event=>{event.stopPropagation();if(!hasPanorama){autoRotate=false;btnAutoRotate.classList.remove('active');setRotationIcon(false);statusEl.textContent='Please load a panorama image first.';return;}autoRotate=!autoRotate;btnAutoRotate.classList.toggle('active',autoRotate);setRotationIcon(autoRotate);statusEl.textContent=autoRotate?'Horizontal rotation started: 3rpm.':'Horizontal rotation stopped.';});
    function enterLightsOff(){document.body.classList.add('lights-off');setLightIcon(true);setTimeout(resize,80);}
    function exitLightsOff(){document.body.classList.remove('lights-off');setLightIcon(false);setTimeout(resize,80);}
    btnViewerFullscreen.addEventListener('click',event=>{event.stopPropagation();if(document.body.classList.contains('lights-off'))exitLightsOff();else enterLightsOff();});
    document.addEventListener('keydown',event=>{if(event.key==='Escape'&&document.body.classList.contains('lights-off'))exitLightsOff();});
function formatElapsed(ms){const total=Math.max(0,Math.floor(ms/1000));const min=String(Math.floor(total/60)).padStart(2,'0');const sec=String(total%60).padStart(2,'0');return `${min}:${sec}`;}
    function waitingText(startedAt,progress=10,pollCount=0,phase='AI 正在生成360全景'){const dots='.'.repeat((Math.floor((Date.now()-startedAt)/1000)%3)+1);return `${phase}${dots} 已等待 ${formatElapsed(Date.now()-startedAt)} / 进度 ${progress||0}% / 查询 ${pollCount} 次。请不要关闭页面。`;}
    async function waitForPanoramaJob(jobId,startedAt,waitInfo){let errors=0,pollCount=0;for(;;){await new Promise(resolve=>setTimeout(resolve,3500));pollCount+=1;try{const response=await fetch(`/vr-api/panorama-jobs/${encodeURIComponent(jobId)}`,{cache:'no-store'});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||`HTTP ${response.status}`);errors=0;waitInfo.phase='AI 正在生成360全景';waitInfo.progress=data.progress||10;waitInfo.pollCount=pollCount;statusEl.textContent=waitingText(startedAt,waitInfo.progress,waitInfo.pollCount,waitInfo.phase);btnSubmit.textContent=`生成中 ${formatElapsed(Date.now()-startedAt)}`;if(data.status==='FINISHED'){const imageUrl=data.imageUrl||data.publicImageUrl;if(!imageUrl)throw new Error('生成完成但没有返回图片地址');setPanorama(imageUrl,'生成的360全景');statusEl.textContent=`360全景生成完成。总等待 ${formatElapsed(Date.now()-startedAt)}。`;return;}if(data.status==='FAILED')throw new Error(data.error||'生成失败');}catch(error){errors+=1;if(errors>=5)throw error;waitInfo.phase=`网络查询暂时失败 ${errors}/5，继续自动重试`;statusEl.textContent=`服务器仍在处理，${waitInfo.phase}。已等待 ${formatElapsed(Date.now()-startedAt)}。`;btnSubmit.textContent=`等待中 ${formatElapsed(Date.now()-startedAt)}`;}}}
    btnSubmit.addEventListener('click',async()=>{if(btnSubmit.disabled)return;if(passcode.value.trim()!=='3DVR'){alert('请输入正确口令：3DVR');return;}if(!imagePayload){alert('请先上传建筑或环境图片');return;}const originalLabel=btnSubmit.textContent;const startedAt=Date.now();const waitInfo={phase:'正在提交/排队',progress:10,pollCount:0};let heartbeat=null;btnSubmit.disabled=true;btnSubmit.textContent='提交中 00:00';statusEl.textContent='正在提交生成360全景空间...';heartbeat=setInterval(()=>{btnSubmit.textContent=`生成中 ${formatElapsed(Date.now()-startedAt)}`;statusEl.textContent=waitingText(startedAt,waitInfo.progress,waitInfo.pollCount,waitInfo.phase);},1000);try{const response=await fetch('/vr-api/panorama',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode:'3DVR',spaceName:spaceName.value.trim(),prompt:extraPrompt.value.trim(),image:imagePayload})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||`HTTP ${response.status}`);if(!data.jobId)throw new Error('服务器没有返回 jobId');waitInfo.phase='已提交，AI 正在生成';waitInfo.progress=data.progress||10;statusEl.textContent=waitingText(startedAt,waitInfo.progress,waitInfo.pollCount,waitInfo.phase);await waitForPanoramaJob(data.jobId,startedAt,waitInfo);}catch(error){statusEl.textContent=`提交失败：${error.message}。已等待 ${formatElapsed(Date.now()-startedAt)}。`;}finally{if(heartbeat)clearInterval(heartbeat);btnSubmit.disabled=false;btnSubmit.textContent=originalLabel;}});
    viewer.addEventListener('pointerdown',event=>{dragging=true;lastX=event.clientX;lastY=event.clientY;viewer.classList.add('dragging');viewer.setPointerCapture(event.pointerId);});
    viewer.addEventListener('pointermove',event=>{if(!dragging)return;lon-=(event.clientX-lastX)*.13;lat+=(event.clientY-lastY)*.13;lastX=event.clientX;lastY=event.clientY;});
    function stopDrag(){dragging=false;viewer.classList.remove('dragging');}
    viewer.addEventListener('pointerup',stopDrag);viewer.addEventListener('pointercancel',stopDrag);viewer.addEventListener('wheel',event=>{event.preventDefault();fov=Math.min(100,Math.max(35,fov+event.deltaY*.04));},{passive:false});
    initSphere();resize();animate();buildGallery();window.addEventListener('resize',resize);
  </script>
</body>
</html>
