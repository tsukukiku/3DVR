<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Everything / 3D-VR</title>
  <style>
    :root { --ink:#111817; --muted:#5c6a66; --paper:#edf2ec; --panel:rgba(244,250,244,.86); --aqua:#0f7280; --deep:#0e1f24; --line:rgba(25,56,58,.18); }
    *{box-sizing:border-box} body{margin:0;min-height:100vh;color:var(--ink);font-family:"Bahnschrift","Noto Sans SC",sans-serif;background:radial-gradient(circle at 78% 8%,rgba(255,255,255,.82),transparent 26%),radial-gradient(circle at 8% 92%,rgba(31,138,151,.24),transparent 31%),linear-gradient(135deg,#f5f0df 0%,#b7d9d4 52%,#6f9eaa 100%);overflow-x:hidden}.page{min-height:100vh;padding:18px clamp(12px,3vw,42px) 28px;background-image:linear-gradient(rgba(15,80,93,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(15,80,93,.05) 1px,transparent 1px);background-size:34px 34px}.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}.brand{font-size:clamp(38px,8vw,96px);line-height:.86;letter-spacing:-.07em;font-weight:900;text-transform:uppercase}.brand span{color:var(--aqua)}.back{color:#f5fbf8;background:var(--deep);border-radius:999px;padding:10px 14px;text-decoration:none;font-size:13px;font-weight:900;white-space:nowrap}.layout{display:grid;grid-template-columns:minmax(280px,380px) minmax(0,1fr);gap:18px;align-items:start}.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 20px 70px rgba(15,40,38,.2);padding:15px;backdrop-filter:blur(12px)}label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:900;margin:11px 0 6px}input,textarea,button{font:inherit}input,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.72);color:var(--ink);padding:10px 11px;outline:none}textarea{min-height:84px;resize:vertical;font-family:"Noto Sans SC",sans-serif;line-height:1.55}.pass-row{display:grid;grid-template-columns:minmax(116px,160px) 1fr;gap:10px;align-items:center}.note{color:var(--aqua);font-size:13px;font-weight:900;white-space:nowrap}.preview{min-height:120px;border:1px dashed rgba(15,80,93,.38);border-radius:18px;display:grid;place-items:center;overflow:hidden;color:var(--muted);background:rgba(255,255,255,.28);text-align:center}.preview img{width:100%;height:100%;object-fit:contain;display:block}.actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}button,.file-button{border:0;border-radius:999px;background:var(--deep);color:#f7fffb;padding:10px 13px;cursor:pointer;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}button.secondary{background:var(--aqua)}.hidden-file{display:none}.status{margin-top:10px;font-size:13px;color:var(--muted);line-height:1.5}.viewer-wrap{display:grid;gap:13px}.viewer{height:min(67vh,720px);min-height:380px;border-radius:26px;border:1px solid rgba(255,255,255,.42);box-shadow:0 24px 80px rgba(8,33,36,.28);overflow:hidden;position:relative;background:linear-gradient(180deg,#dbeef2,#7fa9b0);cursor:grab;user-select:none;touch-action:none}.viewer.dragging{cursor:grabbing}.sphere{position:absolute;inset:0;background-image:var(--pano,none);background-repeat:repeat-x;background-position:50% 50%;background-size:auto 100%;filter:saturate(1.05) contrast(1.02);transform:scale(var(--zoom,1));transform-origin:center}.viewer.empty .sphere{display:none}.viewer:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 50%,transparent 42%,rgba(0,0,0,.12) 100%),linear-gradient(90deg,rgba(255,255,255,.16),transparent 16%,transparent 84%,rgba(0,0,0,.16));mix-blend-mode:multiply}.hud{position:absolute;left:14px;bottom:14px;display:flex;gap:8px;flex-wrap:wrap;z-index:2}.pill{border-radius:999px;background:rgba(8,20,24,.78);color:#eefcf7;padding:8px 11px;font-size:12px;font-weight:900;backdrop-filter:blur(8px)}.empty-text{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px;color:#244044;font-weight:900;line-height:1.7}.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.sample{border:1px solid var(--line);border-radius:16px;min-height:92px;background-image:linear-gradient(to top,rgba(0,0,0,.56),rgba(0,0,0,.08)),var(--thumb);background-size:cover;background-position:center;color:#f7fffb;font-weight:900;text-shadow:0 2px 10px rgba(0,0,0,.45);overflow:hidden;display:flex;align-items:flex-end;padding:10px;cursor:pointer}.sample.active{outline:3px solid rgba(15,114,128,.75);outline-offset:2px}footer{margin-top:22px;padding-top:14px;border-top:1px solid var(--line);color:var(--muted);font-size:13px;display:flex;gap:14px;flex-wrap:wrap}footer a{color:var(--ink)}@media(max-width:900px){.layout{grid-template-columns:1fr}.viewer{height:58vh;min-height:340px}.gallery{grid-template-columns:repeat(2,1fr)}.brand{font-size:clamp(36px,12vw,68px)}}
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar"><div class="brand">3D-<span>VR</span></div><a class="back" href="/3DEV/">← 3D Everything</a></div>
    <section class="layout">
      <aside class="panel">
        <label for="spaceName">建筑 / 环境说明</label><input id="spaceName" placeholder="例如：modern cafe interior / forest path / gallery lobby" />
        <label for="vrPasscode">口令</label><div class="pass-row"><input id="vrPasscode" type="password" placeholder="3DVR" autocomplete="off" /><div class="note">每IP每日3回</div></div>
        <label>上传参考图片</label><input id="imageInput" type="file" accept="image/*" /><div class="preview" id="preview">上传后显示参考图片预览</div>
        <label for="extraPrompt">补充要求</label><textarea id="extraPrompt" placeholder="可选：白天/夜晚、现代/复古、室内/室外、保留哪些元素、画面风格等"></textarea>
        <div class="actions"><button id="btnPreview" type="button">上传图试看</button><label class="file-button" for="localPanoInput">打开文件</label><input class="hidden-file" id="localPanoInput" type="file" accept="image/*" /><button class="secondary" id="btnSubmit" type="button">生成360全景</button></div>
        <div class="status" id="status">可从图库选择360全景图，或点击【打开文件】查看本地全景照片。</div>
      </aside>
      <section class="viewer-wrap">
        <div class="viewer empty" id="viewer" aria-label="360度全景观察区"><div class="sphere" id="sphere"></div><div class="empty-text" id="emptyText">360 全景观察区<br>拖拽水平/垂直观察，滚轮或双指缩放</div><div class="hud"><span class="pill" id="angleText">Yaw 0°</span><span class="pill" id="pitchText">Pitch 0°</span><span class="pill" id="zoomText">Zoom 1.00x</span></div></div>
        <article class="panel"><label>图库 360 全景照片</label><div class="gallery" id="gallery"></div></article>
      </section>
    </section>
    <footer><span>© Star Style Studio</span><a href="/3DEV/policy.html">Policy</a><a href="/3DEV/privacy.html">Privacy</a><a href="/3DEV/">3D Everything</a></footer>
  </main>
  <script>
    const imageInput=document.getElementById('imageInput'),localPanoInput=document.getElementById('localPanoInput'),preview=document.getElementById('preview'),viewer=document.getElementById('viewer'),sphere=document.getElementById('sphere'),emptyText=document.getElementById('emptyText'),angleText=document.getElementById('angleText'),pitchText=document.getElementById('pitchText'),zoomText=document.getElementById('zoomText'),statusEl=document.getElementById('status'),btnPreview=document.getElementById('btnPreview'),btnSubmit=document.getElementById('btnSubmit'),spaceName=document.getElementById('spaceName'),passcode=document.getElementById('vrPasscode'),extraPrompt=document.getElementById('extraPrompt'),gallery=document.getElementById('gallery');
    const samples=[{title:'AI Panorama 01',src:'./assets/vr-gallery-01-ai-panorama.png'},{title:'AI Panorama 02',src:'./assets/vr-gallery-02-ai-panorama.png'},{title:'Exterior 360',src:'./assets/vr-gallery-03-hugo-rouquette.jpg'},{title:'Urban 360',src:'./assets/vr-gallery-04-lok-yiu-cheung.jpg'},{title:'Living Room 360',src:'./assets/vr-gallery-05-living-room.jpg'}];
    let imagePayload=null,yaw=0,pitch=50,zoom=1,dragging=false,lastX=0,lastY=0,activeObjectUrl='';
    function readFileAsDataUrl(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||''));reader.onerror=reject;reader.readAsDataURL(file);});}
    function loadImage(dataUrl){return new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>resolve(img);img.onerror=reject;img.src=dataUrl;});}
    async function shrinkImageToLimit(file,maxBytes=5*1024*1024){const originalDataUrl=await readFileAsDataUrl(file);if(file.size<=maxBytes)return{dataUrl:originalDataUrl,mimeType:file.type||'image/jpeg',bytes:file.size,originalName:file.name};const img=await loadImage(originalDataUrl);let dataUrl=originalDataUrl,quality=.88;for(let i=0;i<10;i+=1){const scale=Math.pow(.84,i+1),canvas=document.createElement('canvas');canvas.width=Math.max(900,Math.round(img.naturalWidth*scale));canvas.height=Math.max(600,Math.round(img.naturalHeight*scale));canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);dataUrl=canvas.toDataURL('image/jpeg',quality);const approxBytes=Math.round((dataUrl.length-dataUrl.indexOf(',')-1)*.75);if(approxBytes<=maxBytes)return{dataUrl,mimeType:'image/jpeg',bytes:approxBytes,originalName:file.name};quality=Math.max(.55,quality-.08);}const approxBytes=Math.round((dataUrl.length-dataUrl.indexOf(',')-1)*.75);return{dataUrl,mimeType:'image/jpeg',bytes:approxBytes,originalName:file.name};}
    function updateView(){sphere.style.setProperty('--zoom',zoom.toFixed(3));sphere.style.backgroundPosition=`${yaw}% ${pitch}%`;angleText.textContent=`Yaw ${Math.round(((yaw%100)/100)*360)}°`;pitchText.textContent=`Pitch ${Math.round(50-pitch)}°`;zoomText.textContent=`Zoom ${zoom.toFixed(2)}x`;}
    function setPanorama(src,title='全景图'){if(activeObjectUrl&&activeObjectUrl!==src)URL.revokeObjectURL(activeObjectUrl);sphere.style.setProperty('--pano',`url("${src}")`);viewer.classList.remove('empty');emptyText.style.display='none';yaw=50;pitch=50;zoom=1;updateView();statusEl.textContent=`${title} 已载入。拖拽观察，滚轮或双指缩放。`;}
    function selectGalleryItem(button,sample){document.querySelectorAll('.sample').forEach(item=>item.classList.toggle('active',item===button));setPanorama(sample.src,sample.title);}
    function buildGallery(){gallery.innerHTML='';samples.forEach((sample,index)=>{const button=document.createElement('button');button.type='button';button.className='sample';button.style.setProperty('--thumb',`url("${sample.src}")`);button.textContent=sample.title;button.addEventListener('click',()=>selectGalleryItem(button,sample));gallery.appendChild(button);if(index===0)setTimeout(()=>selectGalleryItem(button,sample),80);});}
    imageInput.addEventListener('change',async()=>{const file=imageInput.files&&imageInput.files[0];if(!file)return;statusEl.textContent='正在处理图片，必要时自动压缩到 5MB 以下...';imagePayload=await shrinkImageToLimit(file);preview.innerHTML=`<img src="${imagePayload.dataUrl}" alt="上传图片预览">`;statusEl.textContent=`图片已选择：${Math.round(imagePayload.bytes/1024)}KB`;});
    localPanoInput.addEventListener('change',()=>{const file=localPanoInput.files&&localPanoInput.files[0];if(!file)return;if(activeObjectUrl)URL.revokeObjectURL(activeObjectUrl);activeObjectUrl=URL.createObjectURL(file);setPanorama(activeObjectUrl,file.name||'本地全景文件');});
    btnPreview.addEventListener('click',()=>{if(!imagePayload){alert('请先上传建筑或环境图片');return;}setPanorama(imagePayload.dataUrl,'上传参考图');});
    btnSubmit.addEventListener('click',async()=>{if(passcode.value.trim()!=='3DVR'){alert('请输入正确口令：3DVR');return;}if(!imagePayload){alert('请先上传建筑或环境图片');return;}statusEl.textContent='正在提交生成360全景空间...';try{const response=await fetch('/vr-api/panorama',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode:'3DVR',spaceName:spaceName.value.trim(),prompt:extraPrompt.value.trim(),image:imagePayload})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||`HTTP ${response.status}`);const imageUrl=data.imageUrl||data.publicImageUrl||data.url;if(imageUrl)setPanorama(imageUrl,'生成的360全景');statusEl.textContent='360全景生成完成。';}catch(error){statusEl.textContent=`提交失败：${error.message}`;}});
    viewer.addEventListener('pointerdown',event=>{dragging=true;lastX=event.clientX;lastY=event.clientY;viewer.classList.add('dragging');viewer.setPointerCapture(event.pointerId);});
    viewer.addEventListener('pointermove',event=>{if(!dragging)return;yaw=(yaw-(event.clientX-lastX)*.09)%100;pitch=Math.max(18,Math.min(82,pitch+(event.clientY-lastY)*.08));lastX=event.clientX;lastY=event.clientY;updateView();});
    viewer.addEventListener('pointerup',()=>{dragging=false;viewer.classList.remove('dragging');});viewer.addEventListener('pointercancel',()=>{dragging=false;viewer.classList.remove('dragging');});viewer.addEventListener('wheel',event=>{event.preventDefault();zoom=Math.min(2.6,Math.max(1,zoom-event.deltaY*.001));updateView();},{passive:false});
    buildGallery();
  </script>
</body>
</html>
